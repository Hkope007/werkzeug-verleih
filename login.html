
!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Werkzeugverwaltung</title>

    <style>
        body { font-family: Arial; padding: 20px; }
        .box {
            max-width: 300px; margin: auto; margin-top: 60px;
            padding: 20px; border: 1px solid #ccc; border-radius: 8px;
        }
        input, button { width: 100%; padding: 10px; margin-top: 12px; }
        button { background: #007bff; color: #fff; border: none; border-radius: 5px; }
    </style>
</head>

<body>
<div class="box">
    <h2>Login</h2>

    <input id="email" placeholder="E-Mail">
    <input id="password" type="password" placeholder="Passwort">
    <button onclick="login()">Einloggen</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } 
        from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "DEINE_API_KEY",
        authDomain: "DEIN_PROJECT.firebaseapp.com",
        projectId: "DEIN_PROJECT"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();

    // Wenn der User schon eingeloggt ist => weiter zur App
    onAuthStateChanged(auth, user => {
        if (user) window.location = "index.html";
    });

    // Login Funktion
    window.login = function () {
        const email = document.getElementById("email").value;
        const pw = document.getElementById("password").value;

        signInWithEmailAndPassword(auth, email, pw)
            .then(() => window.location = "index.html")
            .catch(err => alert("Login fehlgeschlagen:\n" + err.message));
    };
</script>
</body>
</html>
