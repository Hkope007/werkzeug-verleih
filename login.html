<html lang="de">
<head>
 <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
``
</head>
<body>

<h2>🔐 Login Werkzeug-Verleih</h2>

<div class="card">
  <input id="email" type="email" placeholder="E-Mail">
  <input id="password" type="password" placeholder="Passwort">
  <button onclick="login()">✅ Login</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCjoG7jIP1xs-uoBTMezml7UuTsyIouzoY",
  authDomain: "werkzeug-verleih-sv.firebaseapp.com",
  projectId: "werkzeug-verleih-sv",
  storageBucket: "werkzeug-verleih-sv.appspot.com",
  messagingSenderId: "1083183347140",
  appId: "1:1083183347140:web:26b2a6c2203b7c6021e091"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(async user => {
  if (!user) return;
  const s = await db.collection("users").where("email", "==", user.email).get();
  if (!s.empty) window.location.href = "index.html";
});

async function login() {
  const email = document.getElementById("email").value;
  const pw = document.getElementById("password").value;

  try {
    await auth.signInWithEmailAndPassword(email, pw);
    window.location.href = "index.html";
  } catch(e) {
    alert("❌ " + e.message);
  }
}
</script>

</body>
</html>
