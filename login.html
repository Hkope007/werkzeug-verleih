
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
  body {
: 0;    font-family: Arial, sans-serif;
  }
  .login-box {
    background: white;
    padding: 25px;
    border-radius: 8px;
    width: 300px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
  }
  input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
  }
  button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    background: #0080ff;
    color: white;
    border: none;
    border-radius: 5px;
  }
</style>

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
// ✅ Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCjoG7jIP1xs-uoBTMezml7UuTsyIouzoY",
  authDomain: "werkzeug-verleih-sv.firebaseapp.com",
  projectId: "werkzeug-verleih-sv",
  storageBucket: "werkzeug-verleih-sv.appspot.com",
  messagingSenderId: "1083183347140",
  appId: "1:1083183347140:web:26b2a6c2203b7c6021e091"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ✅ Persistenter Login (SEHR wichtig!)
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

// ✅ Falls Nutzer schon eingeloggt → direkt weiter
auth.onAuthStateChanged(user => {
  if (user) {
    window.location.href = "welcome.html";
  }
});

// ✅ Login-Funktion
function loginUser() {
  const mail = document.getElementById("email").value.trim();
  const pw   = document.getElementById("password").value.trim();

  auth.signInWithEmailAndPassword(mail, pw)
    .then(() => {
      window.location.href = "welcome.html";  // ✅ Korrekte Weiterleitung
    })
    .catch(err => alert("Fehler: " + err.message));
}
</script>

</head>
<body>

<div class="login-box">
  <h2>Login</h2>

  <input id="email" type="email" placeholder="E-Mail">
  <input id="password" type="password" placeholder="Passwort">

  <button onclick="loginUser()">Anmelden</button>
</div>

</body>
</html>
