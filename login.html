
<!DOCTYPE html>">
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Werkzeug-Verleih</title>

    <style>
        body { font-family: Arial; padding: 20px; }
        .box {
            max-width: 300px; margin: auto; margin-top: 80px;
            padding: 20px; border: 1px solid #ccc; border-radius: 8px;
        }
        input, button {
            width: 100%; padding: 10px; margin-top: 12px;
        }
        button {
            background: #007bff; color: white; border: none; border-radius: 5px;
        }
        #err { margin-top: 10px; color: red; }
    </style>
</head>

<body>

<div class="box">
    <h2>Login</h2>
    <input id="email" placeholder="E-Mail">
    <input id="password" type="password" placeholder="Passwort">
    <button onclick="login()">Einloggen</button>

    <div id="err"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCjoG7jIP1xs-uoBTMezml7UuTsyIouzoY",
      authDomain: "werkzeug-verleih-sv.firebaseapp.com",
      projectId: "werkzeug-verleih-sv"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Eingeloggt => Weiterleiten
    onAuthStateChanged(auth, user => {
        if (user) window.location = "index.html";
    });

    // LOGIN
    window.login = function () {
        const email = document.getElementById("email").value;
        const pw = document.getElementById("password").value;

        signInWithEmailAndPassword(auth, email, pw)
            .then(() => window.location = "index.html")
            .catch(err => {
                document.getElementById("err").innerHTML =
                    err.code + "<br>" + err.message;
            });
    };
</script>

</body>
</html>
