
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werkzeug-Verleih</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
            background: #f2f2f2;
        }

        .title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 14px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        h3 {
            margin-top: 0;
            margin-bottom: 12px;
        }

        input, select {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 18px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 18px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            margin-top: 15px;
            color: white;
        }

        #borrowBtn { background: #2ecc71; }
        #returnBtn { background: #e74c3c; }

        #logoutBtn {
            background: #6c757d;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 16px;
            border: none;
            margin-bottom: 15px;
        }

        .history-entry {
            padding: 10px 0;
            font-size: 16px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

div class="title" style="color: red;">Werkzeug Verleih Lager SV</div>

<div class="card">
    Eingeloggt als: <b id="userInfo"></b><br><br>
    <button id="logoutBtn" onclick="logout()">Logout</button>
</div>

<div class="card">
    <h3>Werkzeug</h3>
    <div id="toolBox">Lade Werkzeug…</div>
</div>

<div class="card">
    <h3>Stückzahl auswählen</h3>
    <select id="amountSelect"></select>

    <h3>Verleih an</h3>
    <input id="personField" placeholder="Name der Person (leer = selbst)">

    <button id="borrowBtn" onclick="borrowTool()">✅ Ausleihen</button>
    <button id="returnBtn" onclick="returnTool()">↩️ Zurückgeben</button>
</div>

<div class="card">
    <h3>Verlauf (neueste zuerst)</h3>
    <div id="historyBox"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import {
        getFirestore, doc, getDoc, updateDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCjoG7jIP1xs-uoBTMezml7UuTsyIouzoY",
        authDomain: "werkzeug-verleih-sv.firebaseapp.com",
        projectId: "werkzeug-verleih-sv"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore();

    let currentUser = null;
    let toolRef = null;
    let toolData = null;

    function formatDate(iso) {
        const d = new Date(iso);
        return d.toLocaleString("de-DE", {
            day: "2-digit",
            month: "2-digit",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
        });
    }

    onAuthStateChanged(auth, async user => {
        if (!user) { window.location = "login.html"; return; }

        currentUser = user;
        document.getElementById("userInfo").innerText = user.email;

        const params = new URLSearchParams(window.location.search);
        const toolID = params.get("tool");

        loadTool(toolID);
    });

    async function loadTool(id) {
        toolRef = doc(db, "tools", id);
        const snap = await getDoc(toolRef);

        if (!snap.exists()) {
            toolBox.innerHTML = "Werkzeug existiert nicht!";
            return;
        }

        toolData = snap.data();

        toolBox.innerHTML = `
            <b>Name:</b> ${toolData.name}<br>
            <b>Gesamt:</b> ${toolData.total}<br>
            <b>Verfügbar:</b> ${toolData.available}
        `;

        loadAmountSelector();
        loadHistory(toolData.history ?? []);
    }

    function loadAmountSelector() {
        const sel = document.getElementById("amountSelect");
        sel.innerHTML = "";

        const max = toolData.total;

        for (let i = 1; i <= max; i++) {
            let opt = document.createElement("option");
            opt.value = i;
            opt.textContent = `${i} Stück`;
            sel.appendChild(opt);
        }

        sel.value = 1;
    }

    function loadHistory(list) {
        const sorted = [...list].sort((a, b) =>
            new Date(b.time) - new Date(a.time)
        );

        historyBox.innerHTML = sorted.map(entry => `
            <div class="history-entry">
                ${formatDate(entry.time)} – <b>${entry.user}</b> – ${entry.action} (${entry.amount} Stück)
                ${entry.person ? " an: " + entry.person : ""}
            </div>
        `).join("");
    }

    window.borrowTool = async function () {
        let person = personField.value.trim();
        if (person === "") {
            person = currentUser.email; // ✅ selbst ausgeliehen
        }

        const amount = Number(amountSelect.value);

        if (amount > toolData.available) {
            return alert("Nicht genug verfügbare Stück!");
        }

        let history = toolData.history ?? [];

        history.push({
            user: currentUser.email,
            action: "Ausgeliehen",
            amount: amount,
            person: person,
            time: new Date().toISOString()
        });

        history = history.sort((a, b) => new Date(b.time) - new Date(a.time)).slice(0, 6);

        await updateDoc(toolRef, {
            available: toolData.available - amount,
            history: history
        });

        location.reload();
    };

    window.returnTool = async function () {
        const amount = Number(amountSelect.value);

        if (toolData.available + amount > toolData.total) {
            return alert("Du gibst mehr zurück als möglich!");
        }

        let history = toolData.history ?? [];

        history.push({
            user: currentUser.email,
            action: "Zurückgegeben",
            amount: amount,
            person: "",
            time: new Date().toISOString()
        });

        history = history.sort((a, b) => new Date(b.time) - new Date(a.time)).slice(0, 6);

        await updateDoc(toolRef, {
            available: toolData.available + amount,
            history: history
        });

        location.reload();
    };

    window.logout = function () {
        signOut(auth).then(() => window.location = "login.html");
    };
</script>

</body>
</html>
