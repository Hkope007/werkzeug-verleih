<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Werkzeugdetails</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }

    #toolCard {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }

    label {
      display: block;
      margin-top: 10px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: #0080ff;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #005fcc;
    }

    .history-entry {
      background: white;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
      box-shadow: 0 0 4px rgba(0,0,0,0.15);
    }

    .history-ausgabe { border-left: 5px solid #0078ff; }
    .history-rueckgabe { border-left: 5px solid #28a745; }
    .history-ausleihe { border-left: 5px solid #ff9800; }

    #logoutBtn {
      background: #d9534f;
      margin-top: 20px;
    }
  </style>
</head>

        window.location = "login.html";
        return;
      }

        .where("email", "==", user.email)
        .get();

      currentUserData = snap.docs[0].data();
      loadTool();
    });
