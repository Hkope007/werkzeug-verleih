<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Werkzeug Verleih</title>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compatrc="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-ript src="https://www.gstatic.com/firebasejsase-auth-compat.js

<style>
body { font-family: Arial; padding:20px; background:#f4f4f4; }
.card { background:white; padding:20px; border-radius:8px; border:1px solid #ccc; max-width:450px; margin-bottom:20px; }
input,select,button { width:100%; padding:10px; margin-top:10px; font-size:16px; }
.history { white-space:pre-line; background:white; border:1px solid #ccc; padding:10px; max-height:250px; overflow-y:auto; }

.history-entry { padding: 8px; border-radius: 6px; margin-bottom: 8px; font-size: 15px; line-height: 1.3; }
.history-ausleihe { background: #fff5b1; border-left: 5px solid #d9b100; }
.history-ausgabe { background: #ffe1b1; border-left: 5px solid #d97c00; }
.history-rueckgabe { background: #d4ffd4; border-left: 5px solid #1f8a1f; }
</style>
</head>

<body>

<button onclick="logout()">🔓 Abmelden</button>

<div id="toolCard" class="card">Warte auf Werkzeug…</div>

<div class="card">
  <h3>📜 Historie</h3>
  <div id="history" class="history">Lade…</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCjoG7jIP1xs-uoBTMezml7UuTsyIouzoY",
  authDomain: "werkzeug-verleih-sv.firebaseapp.com",
  projectId: "werkzeug-verleih-sv",
  storageBucket: "werkzeug-verleih-sv.appspot.com",
  messagingSenderId: "1083183347140",
  appId: "1:1083183347140:web:26b2a6c2203b7c6021e091"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUserData = null;

auth.onAuthStateChanged(async user => {
  if (!user) {
    window.location = "login.html";
    return;
  }

  const snap = await db.collection("users")
    .where("email", "==", user.email)
    .get();

  currentUserData = snap.docs[0].data();
  loadTool();
});

const params = new URLSearchParams(window.location.search);
const toolId = params.get("tool");

const toolRef = db.collection("tools").doc(toolId);
const histRef = db.collection("history_" + toolId);

async function loadTool() {
  const snap = await toolRef.get();
  if (!snap.exists) {
    toolCard.textContent = "❌ Werkzeug nicht gefunden!";
    return;
  }

  const t = snap.data();

  toolCard.innerHTML = `
    <h2>${t.name}</h2>
    <p>Verfügbar: ${t.available} von ${t.total}</p>

    <label>Werkzeug ausgeben an:</label>
    <input id="assigned" placeholder="leer = selbst">

    <label>Menge:</label>
    <select id="qty">
      ${Array.from({length:Number(t.total)}, (_,i)=>`<option>${i+1}</option>`).join("")}
    </select>

    <button onclick="borrow()">➡️ Ausleihen</button>
    <button onclick="giveBack()">⬅️ Rückgabe</button>
  `;

  loadHistory();
}

async function loadHistory(){
  const snap = await histRef.orderBy("time","desc").get();

  if (snap.empty){
    history.innerHTML = "<div class='history-entry'>Keine Einträge</div>";
    return;
  }

  history.innerHTML = snap.docs.map(doc => {
    const h = doc.data();

    const time = h.time ? new Date(h.time).toLocaleString() : "Unbekannte Zeit";
    const giver = h.bookedBy ?? "Unbekannt";
    const recv  = h.assignedTo ?? "Unbekannt";
    const text  = h.text ?? "";

    let cssClass = "history-entry";
    if (text.includes("zurück")) cssClass += " history-rueckgabe";
    else if (text.includes("ausgegeben")) cssClass += " history-ausgabe";
    else if (text.includes("selbst")) cssClass += " history-ausleihe";

    return `
      <div class="${cssClass}">
        ${time}<br>
        <b>${giver}</b> ➜ <b>${recv}</b><br>
        ${text}
      </div>
    `;
  }).join("");
}

async function borrow() {
  const qty = Number(document.getElementById("qty").value);
  const assignedInput = document.getElementById("assigned").value.trim();
  const assigned = assignedInput === "" ? currentUserData.name : assignedInput;

  const text =
    assigned === currentUserData.name
      ? `${qty} Stück selbst ausgeliehen`
      : `${qty} Stück an ${assigned} ausgegeben`;

  await db.runTransaction(async tx => {
    const snap = await tx.get(toolRef);
    const t = snap.data();

    if (Number(t.available) < qty) {
      alert("Nicht genug verfügbar!");
      return;
    }

    tx.update(toolRef, {
      available: String(Number(t.available) - qty),
      lastBorrower: assigned
    });

    tx.set(histRef.doc(), {
      time: Date.now(),
      bookedBy: currentUserData.name,
      assignedTo: assigned,
      text: text
    });
  });

  loadTool();
}

async function giveBack() {
  const qty = Number(document.getElementById("qty").value);

  await db.runTransaction(async tx => {
    const snap = await tx.get(toolRef);
    const t = snap.data();

    if (Number(t.available) + qty > Number(t.total)) {
      alert("Rückgabe zu hoch!");
      return;
    }

    const originalBorrower = t.lastBorrower || currentUserData.name;

    tx.update(toolRef, {
      available: String(Number(t.available) + qty),
      lastBorrower: null
    });

    tx.set(histRef.doc(), {
      time: Date.now(),
      bookedBy: currentUserData.name,
      assignedTo: originalBorrower,
      text: `${qty} Stück zurückgenommen`
    });
  });

  loadTool();
}

function logout(){
  auth.signOut().then(()=>window.location="login.html");
}
</script>

</body>
</html>
