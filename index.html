
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werkzeug-Verleih</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
            background: #f2f2f2;
        }

        .title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 14px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.10);
        }

        h3 {
            margin-top: 0;
            margin-bottom: 12px;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 18px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 18px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            margin-top: 15px;
            color: white;
        }

        #borrowBtn { background: #2ecc71; }
        #returnBtn { background: #e74c3c; }

        #logoutBtn {
            background: #6c757d;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 16px;
            border: none;
            margin-bottom: 15px;
        }

        .status-green {
            color: #27ae60;
            font-weight: bold;
        }

        .status-red {
            color: #c0392b;
            font-weight: bold;
        }

        .history-entry {
            padding: 10px 0;
            font-size: 16px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

<div class="title">Werkzeug-Verleih</div>

<div class="card">
    Eingeloggt als: <b id="userInfo"></b><br><br>
    <button id="logoutBtn" onclick="logout()">Logout</button>
</div>

<div class="card">
    <h3>Werkzeug</h3>
    <div id="toolBox">Lade Werkzeug…</div>
</div>

<div class="card">
    <h3>Verleih an</h3>
    <input id="personField" placeholder="Name der Person">

    <button id="borrowBtn" onclick="borrowTool()">✅ Ausleihen</button>
    <button id="returnBtn" onclick="returnTool()">↩️ Zurückgeben</button>
</div>

<div class="card">
    <h3>Verlauf (neueste zuerst)</h3>
    <div id="historyBox"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import {
        getFirestore, doc, getDoc, updateDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCjoG7jIP1xs-uoBTMezml7UuTsyIouzoY",
        authDomain: "werkzeug-verleih-sv.firebaseapp.com",
        projectId: "werkzeug-verleih-sv"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore();

    let currentUser = null;
    let toolRef = null;

    //--------------------------
    // DATUM schön formatieren
    //--------------------------
    function formatDate(iso) {
        const d = new Date(iso);
        return d.toLocaleString("de-DE", {
            day: "2-digit",
            month: "2-digit",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
        });
    }

    //--------------------------
    // LOGIN PRÜFEN
    //--------------------------
    onAuthStateChanged(auth, async user => {
        if (!user) { window.location = "login.html"; return; }

        currentUser = user;
        userInfo.innerText = user.email;

        const params = new URLSearchParams(window.location.search);
        const toolID = params.get("tool");

        loadTool(toolID);
    });

    //--------------------------
    // WERKZEUG LADEN
    //--------------------------
    async function loadTool(id) {
        toolRef = doc(db, "tools", id);
        const snap = await getDoc(toolRef);

        if (!snap.exists()) {
            toolBox.innerHTML = "Werkzeug existiert nicht!";
            return;
        }

        const data = snap.data();

        toolBox.innerHTML = `
            <div><b>ID:</b> ${id}</div>
            <div><b>Name:</b> ${data.name}</div>
            <div><b>Status:</b> 
                ${data.available == "1" 
                    ? '<span class="status-green">✅ Verfügbar</span>' 
                    : '<span class="status-red">❌ Ausgeliehen</span>'}
            </div>
        `;

        loadHistory(data.history ? [...data.history] : []);
    }

    //--------------------------
    // VERLAUF ANZEIGEN
    //--------------------------
    function loadHistory(list) {

        const sorted = list.sort((a, b) =>
            new Date(b.time) - new Date(a.time)
        );

        historyBox.innerHTML = sorted.map(entry => `
            <div class="history-entry">
                ${formatDate(entry.time)} – <b>${entry.user}</b> – ${entry.action}
                ${entry.person ? " an: " + entry.person : ""}
            </div>
        `).join("");
    }

    //--------------------------
    // AUSLEIHEN (NEUER EINTRAG BLEIBT!)
    //--------------------------
    window.borrowTool = async function () {
        const person = personField.value.trim();
        if (person === "") return alert("Bitte Empfänger eingeben!");

        const snap = await getDoc(toolRef);
        const data = snap.data();
        let history = data.history || [];

        history.push({
            user: currentUser.email,
            action: "Ausgeliehen",
            person: person,
            time: new Date().toISOString()
        });

        history.sort((a, b) => new Date(b.time) - new Date(a.time));
        history = history.slice(0, 6);

        await updateDoc(toolRef, {
            available: "0",
            history: history
        });

        location.reload();
    };

    //--------------------------
    // ZURÜCKGEBEN (NEUER EINTRAG BLEIBT!)
    //--------------------------
    window.returnTool = async function () {

        const snap = await getDoc(toolRef);
        const data = snap.data();
        let history = data.history || [];

        history.push({
            user: currentUser.email,
            action: "Zurückgegeben",
            person: "",
            time: new Date().toISOString()
        });

        history.sort((a, b) => new Date(b.time) - new Date(a.time));
        history = history.slice(0, 6);

        await updateDoc(toolRef, {
            available: "1",
            history: history
        });

        location.reload();
    };

    //--------------------------
    // LOGOUT
    //--------------------------
    window.logout = function () {
        signOut(auth).then(() => window.location = "login.html");
    };
</script>

</body>
</html>
