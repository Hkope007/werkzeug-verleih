<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Werkzeug Verleih</title>

  <script src="httpsc.com/firebasejs/10.8.0/firebase-app-compat.js
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestorecript src="https://www.gstatic.com/firebasejs/10-auth-compat.js</script>

  <style>
    body { font-family: Arial; background:#f4f4f4; padding:20px; }
    .card { background:white; padding:20px; border-radius:8px; border:1px solid #ccc; max-width:450px; }
    input, select, button { width:100%; padding:10px; margin-top:10px; font-size:16px; }
    .history { white-space:pre-line; margin-top:20px; padding:10px; border:1px solid #ddd; background:#fff; max-height:300px; overflow-y:auto; }
  </style>
</head>

<body>

<button onclick="logout()">🔓 Abmelden</button>

<div id="toolCard" class="card">Warte auf Werkzeug…</div>

<div class="card">
  <h3>📜 Historie</h3>
  <div id="history" class="history">Lade…</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCjoG7jIP1xs-uoBTMezml7UuTsyIouzoY",
  authDomain: "werkzeug-verleih-sv.firebaseapp.com",
  projectId: "werkzeug-verleih-sv",
  storageBucket: "werkzeug-verleih-sv.appspot.com",
  messagingSenderId: "1083183347140",
  appId: "1:1083183347140:web:26b2a6c2203b7c6021e091"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let userData = null;

auth.onAuthStateChanged(async user=>{
  if(!user) return window.location="login.html";

  const snap=await db.collection("users").where("email","==",user.email).get();
  if(snap.empty) return alert("Benutzer nicht registriert!");
  userData=snap.docs[0].data();

  loadTool();
});

function logout(){ auth.signOut().then(()=>window.location="login.html"); }

const params=new URLSearchParams(window.location.search);
const toolId=params.get("tool");
const toolRef=db.collection("tools").doc(toolId);
const histRef=db.collection("history_"+toolId);

async function loadTool(){
  const snap=await toolRef.get();
  if(!snap.exists){
    toolCard.innerHTML="❌ Werkzeug nicht gefunden!";
    return;
  }

  const t=snap.data();

  toolCard.innerHTML=`
    <h2>${t.name}</h2>
    <p>Verfügbar: ${t.available} von ${t.total}</p>

    <label>Werkzeug ausgeben an:</label>
    <input id="assigned" placeholder="leer = selbst">

    <label>Menge:</label>
    <select id="qty">
      ${Array.from({length:Number(t.total)},(_,i)=>`<option>${i+1}</option>`).join("")}
    </select>

    <button onclick="borrow()">➡️ Ausleihen</button>
    <button onclick="giveBack()">⬅️ Rückgabe</button>
  `;

  loadHistory();
}

async function loadHistory(){
  const snap=await histRef.orderBy("time","desc").get();
  if(snap.empty){ history.innerHTML="Keine Einträge"; return; }

  history.innerHTML=snap.docs.map(d=>{
    const h=d.data();
    return `${new Date(h.time).toLocaleString()} – ${h.bookedBy} ➜ ${h.assignedTo}: ${h.text}`;
  }).join("\n");
}

async function borrow(){
  const qty=Number(document.getElementById("qty").value);
  const assigned=document.getElementById("assigned").value.trim() || userData.name;

  await db.runTransaction(async tx=>{
    const snap=await tx.get(toolRef);
    const t=snap.data();

    if(Number(t.available)<qty) return alert("Nicht genug verfügbar!");

    tx.update(toolRef,{available:String(Number(t.available)-qty)});
    tx.set(histRef.doc(),{
      time:Date.now(),
      bookedBy:userData.name,
      assignedTo:assigned,
      text:`${qty} Stück ausgegeben`
    });
  });

  loadTool();
}

async function giveBack(){
  const qty=Number(document.getElementById("qty").value);

  await db.runTransaction(async tx=>{
    const snap=await tx.get(toolRef);
    const t=snap.data();

    if(Number(t.available)+qty>Number(t.total)) return alert("Rückgabe zu hoch!");

    tx.update(toolRef,{available:String(Number(t.available)+qty)});
    tx.set(histRef.doc(),{
      time:Date.now(),
      bookedBy:userData.name,
      assignedTo:userData.name,
      text:`${qty} Stück zurückgegeben`
    });
  });

  loadTool();
}
</script>

</body>
</html>
