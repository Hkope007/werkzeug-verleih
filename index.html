<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Werkzeug Verleih</title>

  <!-- ✅ Firebase SDK korrekt -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; background: #f4f4f4; }
    .card {
      background: white; padding: 20px; border-radius: 9px;
      border: 1px solid #ccc; max-width: 480px; margin-bottom: 20px;
    }
    input, select, button { width: 100%; padding: 12px; margin-top: 10px; font-size: 16px; }
    .history { white-space: pre-line; max-height: 260px; overflow-y: auto; padding: 10px; border: 1px solid #ddd; }
  </style>
</head>

<body>

<button onclick="logout()">🔓 Abmelden</button>

<div id="toolCard" class="card">Warte auf Werkzeug…</div>

<div class="card">
  <h3>📜 Historie</h3>
  <div id="history" class="history">Noch keine Einträge</div>
</div>

<script>
/* ✅ Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyCjoG7jIP1xs-uoBTMezml7UuTsyIouzoY",
  authDomain: "werkzeug-verleih-sv.firebaseapp.com",
  projectId: "werkzeug-verleih-sv",
  storageBucket: "werkzeug-verleih-sv.appspot.com",
  messagingSenderId: "1083183347140",
  appId: "1:1083183347140:web:26b2a6c2203b7c6021e091"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUserData = null;

/* ✅ Login prüfen */
auth.onAuthStateChanged(async user => {
  if (!user) return window.location = "login.html";

  const snap = await db.collection("users").where("email", "==", user.email).get();
  currentUserData = snap.docs[0].data();

  loadTool();
});

/* ✅ Werkzeug-ID über URL */
const params = new URLSearchParams(window.location.search);
const toolId = params.get("tool");
const toolRef = db.collection("tools").doc(toolId);
const histRef = db.collection("history_" + toolId);

/* ✅ Werkzeug laden */
async function loadTool() {
  const snap = await toolRef.get();
  if (!snap.exists) {
    document.getElementById("toolCard").innerHTML = "❌ Werkzeug nicht gefunden!";
    return;
  }

  const t = snap.data();

  document.getElementById("toolCard").innerHTML = `
    <h2>${t.name}</h2>
    <p><b>Verfügbar:</b> ${t.available} von ${t.total}</p>

    <label>Werkzeug ausgeben an:</label>
    <input id="assigned" placeholder="leer = selbst">

    <label>Menge:</label>
    <select id="qty">
      ${Array.from({length: Number(t.total)}, (_,i)=>`<option>${i+1}</option>`).join("")}
    </select>

    <button onclick="borrow()">➡️ Ausleihen</button>
    <button onclick="giveBack()">⬅️ Rückgabe</button>
  `;

  loadHistory();
}

/* ✅ Historie laden */
async function loadHistory() {
  const snap = await histRef.orderBy("time","desc").get();

  if (snap.empty) {
    history.innerHTML = "Keine Einträge";
    return;
  }

  history.innerHTML = snap.docs.map(d => {
    const h = d.data();
    return `${new Date(h.time).toLocaleString()} – ${h.bookedBy} ➜ ${h.assignedTo}: ${h.text}`;
  }).join("\n");
}

/* ✅ Ausleihen */
async function borrow() {
  const qty = Number(document.getElementById("qty").value);
  const assigned = document.getElementById("assigned").value.trim() || currentUserData.name;

  await db.runTransaction(async tx => {
    const snap = await tx.get(toolRef);
    const t = snap.data();

    if (Number(t.available) < qty) return alert("Nicht genug verfügbar!");

    tx.update(toolRef, { available: String(Number(t.available) - qty) });
    tx.set(histRef.doc(), {
      time: Date.now(),
      bookedBy: currentUserData.name,
      assignedTo: assigned,
      text: `${qty} Stück ausgeliehen`
    });
  });

  loadTool();
}

/* ✅ Rückgabe */
async function giveBack() {
  const qty = Number(document.getElementById("qty").value);

  await db.runTransaction(async tx => {
    const snap = await tx.get(toolRef);
    const t = snap.data();

    if (Number(t.available) + qty > Number(t.total))
      return alert("Rückgabe zu hoch!");

    tx.update(toolRef,{ available:String(Number(t.available)+qty) });
    tx.set(histRef.doc(),{
      time:Date.now(),
      bookedBy:currentUserData.name,
      assignedTo:currentUserData.name,
      text:`${qty} Stück zurückgegeben`
    });
  });

  loadTool();
}

/* ✅ Logout */
function logout() {
  auth.signOut().then(() => window.location = "login.html");
}
</script>

</body>
</html>
