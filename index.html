<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Werkzeug Verleih</title>

  <script src="https://www.gstatic.com/firebasejs/10-app-compat.js</script>
  https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js
  https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.jsscript>
</head>

<body>

<div id="toolCard">Lade Werkzeug…</div>
<div id="history">Lade Historie…</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCjoG7jIP1xs-uoBTMezml7UuTsyIouzoY",
  authDomain: "werkzeug-verleih-sv.firebaseapp.com",
  projectId: "werkzeug-verleih-sv",
  storageBucket: "werkzeug-verleih-sv.appspot.com",
  messagingSenderId: "1083183347140",
  appId: "1:1083183347140:web:26b2a6c2203b7c6021e091"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

auth.onAuthStateChanged(async user => {
  if(!user){
    window.location = "login.html";
    return;
  }
  loadTool();
});

const params = new URLSearchParams(window.location.search);
const toolId = params.get("tool");
const toolRef = db.collection("tools").doc(toolId);
const histRef = db.collection("history_" + toolId);

async function loadTool(){
  const snap = await toolRef.get();
  if(!snap.exists){
    document.getElementById("toolCard").textContent = "❌ Werkzeug nicht gefunden";
    return;
  }
  const t = snap.data();
  document.getElementById("toolCard").textContent =
    `Name: ${t.name} - Verfügbar: ${t.available} von ${t.total}`;
}
</script>

</body>
</html>
