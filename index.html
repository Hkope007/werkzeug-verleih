

<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werkzeug-Verleih</title>

    <style>
        body { font-family: Arial; padding: 20px; }
        .box { border: 1px solid #ccc; padding: 15px; border-radius: 8px; }
        button { padding: 10px; margin: 5px; }
        input { padding: 10px; width: 100%; margin-top: 10px; }
    </style>
</head>

<body>

<h2>Werkzeug-Verleih</h2>

<div id="userInfo"></div>
<button onclick="logout()">Logout</button>

<hr>

<h3>Werkzeug</h3>
<div id="toolBox" class="box">Werkzeug wird geladen…</div>

<h3>Verleih an:</h3>
<input id="personField" placeholder="Name der Person, die das Werkzeug bekommt">

<div id="actions" style="display:none;">
    <button onclick="borrowTool()">Ausleihen</button>
    <button onclick="returnTool()">Zurückgeben</button>
</div>

<h3>Verlauf</h3>
<div id="historyBox" class="box"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
        from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import {
        getFirestore, doc, getDoc, updateDoc, arrayUnion
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCjoG7jIP1xs-uoBTMezml7UuTsyIouzoY" ,
      authDomain: "werkzeug-verleih-sv.firebaseapp.com",
      projectId: "werkzeug-verleih-sv",
      storageBucket: "werkzeug-verleih-sv.firebasestorage.app",
      messagingSenderId: "1083183347140",
      appId: "1:1083183347140:web:26b2a6c2203b7c6021e091",
      measurementId: "G-9B4KKYD7F3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore();

    let currentUser = null;
    let toolRef = null;
    let toolID = null;

    // LOGIN PRÜFEN
    onAuthStateChanged(auth, async user => {
        if (!user) { window.location = "login.html"; return; }

        currentUser = user;
        userInfo.innerHTML = "Eingeloggt als: <b>" + user.email + "</b>";

        const params = new URLSearchParams(window.location.search);
        toolID = params.get("tool");

        if (!toolID) {
            toolBox.innerHTML = "Kein Werkzeug übergeben!";
            return;
        }

        loadTool(toolID);
    });

    // WERKZEUG LADEN
    async function loadTool(id) {
        toolRef = doc(db, "tools", id);
        const snap = await getDoc(toolRef);

        if (!snap.exists()) {
            toolBox.innerHTML = "Werkzeug nicht gefunden.";
            return;
        }

        const data = snap.data();

        toolBox.innerHTML = `
            <b>ID:</b> ${id}<br>
            <b>Name:</b> ${data.name}<br>
            <b>Status:</b> ${data.available == "1" ? "✅ Verfügbar" : "❌ Ausgeliehen"}<br>
        `;

        loadHistory(data.history);
        actions.style.display = "block";
    }

    // HISTORY ANZEIGEN
    function loadHistory(list = []) {
        historyBox.innerHTML = list.map(h => `
            <div>
                ${h.time} – <b>${h.user}</b> – ${h.action} ${h.person ? "an: " + h.person : ""}
            </div>
        `).join("");
    }

    // AUSLEIHEN
    window.borrowTool = async function () {
        const person = document.getElementById("personField").value.trim();
        if (person === "") return alert("Bitte Empfängername eintragen!");

        await updateDoc(toolRef, {
            available: "0",
            history: arrayUnion({
                user: currentUser.email,
                action: "Ausgeliehen",
                person: person,
                time: new Date().toLocaleString()
            })
        });
        alert("Werkzeug ausgeliehen!");
        location.reload();
    };

    // ZURÜCKGEBEN
    window.returnTool = async function () {
        await updateDoc(toolRef, {
            available: "1",
            history: arrayUnion({
                user: currentUser.email,
                action: "Zurückgegeben",
                person: "",
                time: new Date().toLocaleString()
            })
        });
        alert("Werkzeug zurückgegeben!");
        location.reload();
    };

    // LOGOUT
    window.logout = function () {
        signOut(auth).then(() => window.location = "login.html");
    };
</script>

</body>
</html>
