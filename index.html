
!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Werkzeugverwaltung – FIREBASE VERSION ✅</title>

  <style>
    body { font-family: Arial; padding: 20px; background: #f4f4f4; }
    #toolCard { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .history-entry { background:white; padding:10px; margin-bottom:10px; border-radius:6px; }
    .history-ausgabe { border-left:5px solid #0080ff; }
    .history-rueckgabe { border-left:5px solid #28a745; }
    .history-ausleihe { border-left:5px solid #ff9800; }
  </style>
</head>
<body>

<h1>🔧 Werkzeugverwaltung – FIREBASE VERSION ✅</h1>

<div id="toolCard">Lade Werkzeugdaten…</div>

<h2>Historie</h2>
<div id="history">Lade Historie…</div>

<button onclick="logout()">Logout</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
// ✅ Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCjoG7jIP1xs-u0BTMezml7UuTsyIouzoY",
  authDomain: "werkzeug-verleih-sv.firebaseapp.com",
  projectId: "werkzeug-verleih-sv",
  storageBucket: "werkzeug-verleih-sv.appspot.com",
  messagingSenderId: "1083183347140",
  appId: "1:1083183347140:web:26b2a6c2203b7c6021e091"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUserData = null;

// ✅ Benutzer aus Firebase laden
auth.onAuthStateChanged(async user => {
  if (!user) { window.location = "werkzeug-verleih/login.html"; return; }

  const snap = await db.collection("users")
    .where("email", "==", user.email).get();

  currentUserData = snap.docs[0].data();
  loadTool();
});

// ✅ Werkzeug-ID
const params = new URLSearchParams(window.location.search);
const toolId = params.get("tool");

const toolRef = db.collection("tools").doc(toolId);
const histRef = db.collection("history_" + toolId);

// ✅ Werkzeug anzeigen
async function loadTool() {
  const snap = await toolRef.get();
  if (!snap.exists) { toolCard.textContent = "❌ Werkzeug nicht gefunden"; return; }

  const t = snap.data();
  toolCard.innerHTML = `
    <h2>${t.name}</h2>
    <p>Verfügbar: ${t.available} von ${t.total}</p>

    <label>Ausgeben an:</label>
    <input id="assigned" placeholder="leer = selbst">

    <label>Menge:</label>
    <select id="qty">
      ${Array.from({length:Number(t.total)}, (_,i)=>`<option>${i+1}</option>`).join("")}
    </select>

    <button onclick="borrow()">➡️ Ausleihen</button>
    <button onclick="giveBack()">⬅️ Rückgabe</button>
  `;

  loadHistory();
}

// ✅ Historie anzeigen
async function loadHistory() {
  const snap = await histRef.orderBy("time","desc").get();
  if (snap.empty) { history.innerHTML = "<div>Keine Einträge</div>"; return; }

  history.innerHTML = snap.docs.map(doc => {
    const h = doc.data();
    const time = new Date(h.time).toLocaleString();
    const text = h.text;
    const giver = h.bookedBy ?? h.bookedby;
    const recv  = h.assignedTo ?? h.assignedto;

    return `
      <div class="history-entry">
        ${time}<br>
        <b>${giver}</b> → <b>${recv}</b><br>
        ${text}
      </div>
    `;
  }).join("");
}

// ✅ Ausleihen
async function borrow() {
  const qty = Number(qty.value);
  const assignedTo = assigned.value.trim() === "" ? currentUserData.name : assigned.value;

  await db.runTransaction(async tx => {
    const snap = await tx.get(toolRef);
    const t = snap.data();

    tx.update(toolRef, { available: String(Number(t.available) - qty), lastBorrower: assignedTo });

    tx.set(histRef.doc(), {
      time: Date.now(),
      bookedBy: currentUserData.name,
      assignedTo: assignedTo,
      text: `${qty} Stück ausgegeben`
    });
  });

  loadTool();
}

// ✅ Rückgabe
async function giveBack() {
  const qty = Number(qty.value);

  await db.runTransaction(async tx => {
    const snap = await tx.get(toolRef);
    const t = snap.data();

    tx.update(toolRef, { available: String(Number(t.available) + qty), lastBorrower: null });

    tx.set(histRef.doc(), {
      time: Date.now(),
      bookedBy: currentUserData.name,
      assignedTo: t.lastBorrower ?? currentUserData.name,
      text: `${qty} Stück zurückgegeben`
    });
  });

  loadTool();
}

// ✅ Logout
function logout() {
  auth.signOut().then(() => window.location = "werkzeug-verleih/login.html");
}
</script>

</body>
</html>
