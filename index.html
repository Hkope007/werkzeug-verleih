
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Werkzeugverwaltung</title>
</head>
<body>
<h2>Werkzeugverwaltung</h2>

<div id="userInfo"></div>
<button onclick="logout()">Logout</button>

<hr>

<h3>Werkzeug:</h3>
<div id="toolData">Warte auf Scan...</div>

<div id="actions" style="display:none;">
    <button onclick="borrowTool()">Ausleihen</button>
    <button onclick="returnTool()">Zurückgeben</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } 
        from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    import { getFirestore, doc, getDoc, updateDoc, arrayUnion } 
        from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "DEINE_API_KEY",
        authDomain: "DEIN_PROJEKT.firebaseapp.com",
        projectId: "DEIN_PROJEKT",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore();

    let currentUser = null;
    let currentToolId = null;
    let toolRef = null;
    let toolData = null;

    onAuthStateChanged(auth, async user => {
        if (!user) { window.location = "login.html"; return; }

        currentUser = user;
        userInfo.innerHTML = "Eingeloggt als: " + user.email;

        const params = new URLSearchParams(window.location.search);
        currentToolId = params.get("tool");

        if (currentToolId) loadTool(currentToolId);
    });

    // Werkzeugdaten holen
    async function loadTool(id) {
        toolRef = doc(db, "tools", id);
        const snap = await getDoc(toolRef);

        if (!snap.exists()) {
            toolData.innerHTML = "Werkzeug nicht gefunden!";
            return;
        }

        toolData = snap.data();
        toolDataDiv.innerHTML = `
            <b>Name:</b> ${toolData.name}<br>
            <b>Verfügbar:</b> ${toolData.available}<br>
        `;

        actions.style.display = "block";
    }

    // AUSLEIHEN
    window.borrowTool = async function () {
        await updateDoc(toolRef, {
            available: "0",
            history: arrayUnion({
                user: currentUser.email,
                action: "ausgeliehen",
                time: new Date().toISOString()
            })
        });
        alert("Werkzeug ausgeliehen!");
        location.reload();
    };

    // ZURÜCKGEBEN
    window.returnTool = async function () {
        await updateDoc(toolRef, {
            available: "1",
            history: arrayUnion({
                user: currentUser.email,
                action: "zurückgegeben",
                time: new Date().toISOString()
            })
        });
        alert("Werkzeug zurückgegeben!");
        location.reload();
    };

    // LOGOUT
    window.logout = function () {
        signOut(auth).then(() => window.location = "login.html");
    };
</script>

</body>
</html>
