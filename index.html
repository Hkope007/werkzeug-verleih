
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Offline Test – Werkzeugseite</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }
    #toolCard {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }
    label { display: block; margin-top: 10px; }
    input, select {
      width: 100%; padding: 8px; margin-top: 5px;
    }
    button {
      margin-top: 10px; padding: 10px; width: 100%;
      background: #0080ff; border: none; border-radius: 5px; color: white;
      cursor: pointer;
    }
    button:hover { background: #005fcc; }

    .history-entry {
      background: white;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
      box-shadow: 0 0 4px rgba(0,0,0,0.15);
    }
    .history-ausgabe { border-left: 5px solid #0078ff; }
    .history-rueckgabe { border-left: 5px solid #28a745; }
    .history-ausleihe { border-left: 5px solid #ff9800; }

    #logoutBtn {
      background: #d9534f;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>✅ OFFLINE TEST – Werkzeugdetails</h1>

  <div id="toolCard">Lade Werkzeugdaten…</div>

  <h2>Historie (offline Simulation)</h2>
  <div id="history">Wird geladen…</div>

  <script>
    // ✅ Offline-Simulation: Werkzeugdaten manuell setzen
    const tool = {
      name: "Akkuschrauber (Test)",
      available: 3,
      total: 5
    };

    const fakeHistory = [
      {
        time: Date.now() - 1000 * 60 * 60,
        giver: "Heinz",
        recv: "Mario",
        text: "1 Stück ausgegeben",
        type: "ausgabe"
      },
      {
        time: Date.now() - 1000 * 60 * 20,
        giver: "Mario",
        recv: "Heinz",
        text: "1 Stück zurückgegeben",
        type: "rückgabe"
      }
    ];

    // ✅ Werkzeug laden
    function loadTool() {
      document.getElementById("toolCard").innerHTML = `
        <h2>${tool.name}</h2>
        <p>Verfügbar: ${tool.available} von ${tool.total}</p>

        <label>Werkzeug ausgeben an:</label>
        <input id="assigned" placeholder="leer = selbst">

        <label>Menge:</label>
        <select id="qty">
          <option>1</option>
          <option>2</option>
          <option>3</option>
        </select>

        <button onclick="alert('Ausleihen funktioniert (offline) ✔')">
          ➡️ Ausleihen
        </button>

        <button onclick="alert('Rückgabe funktioniert (offline) ✔')">
          ⬅️ Rückgabe
        </button>
      `;

      loadHistory();
    }

    // ✅ Historie laden
    function loadHistory() {
      const hDIV = document.getElementById("history");
      hDIV.innerHTML = fakeHistory.map(h => {
        const t = new Date(h.time).toLocaleString();
        return `
          <div class="history-entry history-${h.type}">
            ${t}<br>
            <b>${h.giver}</b> ➜ <b>${h.recv}</b><br>
            ${h.text}
          </div>
        `;
      }).join("");
    }

    // ✅ Start
    loadTool();
  </script>

</body>
</html>
