
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Werkzeugverwaltung</title>

    <style>
        body { font-family: Arial; padding: 20px; }
        button { padding: 10px 14px; margin: 10px 5px; }
        .box { border: 1px solid #ccc; padding: 15px; margin-top: 20px; border-radius: 8px; }
    </style>
</head>

<body>

<h2>Werkzeugverwaltung</h2>

<div id="userInfo" style="font-weight:bold; margin-bottom:10px;"></div>
<button onclick="logout()">Logout</button>

<hr>

<h3>Werkzeugdetails</h3>
<div id="toolBox" class="box">Noch kein QR-Code gescannt…</div>

<div id="actionButtons" style="display:none;">
    <button onclick="borrowTool()">Ausleihen</button>
    <button onclick="returnTool()">Zurückgeben</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } 
        from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { 
        getFirestore, doc, getDoc, updateDoc, arrayUnion 
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "DEINE_API_KEY",
        authDomain: "DEIN_PROJECT.firebaseapp.com",
        projectId: "DEIN_PROJECT"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore();

    let currentUser = null;
    let toolRef = null;
    let toolId = null;

    // Check Login Status
    onAuthStateChanged(auth, async user => {
        if (!user) { window.location = "login.html"; return; }
        currentUser = user;
        userInfo.innerHTML = "Eingeloggt als: " + user.email;

        // QR Parameter lesen
        const params = new URLSearchParams(window.location.search);
        toolId = params.get("tool");

        if (toolId) loadTool(toolId);
    });

    // Werkzeugdaten laden
    async function loadTool(id) {
        toolRef = doc(db, "tools", id);
        const snap = await getDoc(toolRef);

        if (!snap.exists()) {
            toolBox.innerHTML = "Werkzeug nicht gefunden!";
            return;
        }

        const data = snap.data();

        toolBox.innerHTML = `
            <b>ID:</b> ${id}<br>
            <b>Name:</b> ${data.name}<br>
            <b>Verfügbar:</b> ${data.available == "1" ? "✅ Ja" : "❌ Nein"}<br>
            <b>Verlauf:</b><br>
            <div style="margin-left:10px; font-size:14px;">
                ${(data.history || []).map(h => `• ${h.time}: ${h.user} → ${h.action}`).join("<br>")}
            </div>
        `;

        actionButtons.style.display = "block";
    }

    // AUSLEIHEN
    window.borrowTool = async function () {
        await updateDoc(toolRef, {
            available: "0",
            history: arrayUnion({
                user: currentUser.email,
                action: "ausgeliehen",
                time: new Date().toISOString()
            })
        });
        alert("Werkzeug ausgeliehen!");
        location.reload();
    };

    // ZURÜCKGEBEN
    window.returnTool = async function () {
        await updateDoc(toolRef, {
            available: "1",
            history: arrayUnion({
                user: currentUser.email,
                action: "zurückgegeben",
                time: new Date().toISOString()
            })
        });
        alert("Werkzeug zurückgegeben!");
        location.reload();
    };

    // Logout
    window.logout = function () {
        signOut(auth).then(() => window.location = "login.html");
    };
</script>
</body>
</html>
