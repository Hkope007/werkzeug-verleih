
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF- content="width=device-width, initial-scale=1.0">    <meta charset="UTF-8">
    <title>Werkzeug-Verleih</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
            background: #f7f7f7;
        }

        .title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 14px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.10);
        }

        h3 {
            margin-top: 0;
            margin-bottom: 12px;
        }

        .label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #ccc;
            margin-top: 10px;
            font-size: 17px;
        }

        button {
            width: 48%;
            padding: 14px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            margin-top: 14px;
            color: white;
            font-weight: bold;
        }

        #borrowBtn { background: #28a745; }   /* Grün */
        #returnBtn { background: #dc3545; }   /* Rot */

        #logoutBtn {
            background: #6c757d;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 15px;
            border: none;
            margin-bottom: 15px;
        }

        .status-green {
            color: #28a745;
            font-weight: bold;
        }

        .status-red {
            color: #dc3545;
            font-weight: bold;
        }

        .history-entry {
            padding: 8px 0;
            font-size: 15px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

<div class="title">Werkzeug-Verleih</div>

<div class="card">
    <div style="font-size:15px; margin-bottom:10px;">
        Eingeloggt als: <b id="userInfo"></b>
    </div>
    <button id="logoutBtn" onclick="logout()">Logout</button>
</div>

<div class="card">
    <h3>Werkzeug</h3>
    <div id="toolBox">Lade Werkzeug…</div>
</div>

<div class="card">
    <h3>Verleih an</h3>
    <input id="personField" placeholder="Name der Person">
    <div style="display:flex; justify-content:space-between;">
        <button id="borrowBtn" onclick="borrowTool()">Ausleihen</button>
        <button id="returnBtn" onclick="returnTool()">Zurückgeben</button>
    </div>
</div>

<div class="card">
    <h3>Verlauf</h3>
    <div id="historyBox"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import {
        getFirestore, doc, getDoc, updateDoc, arrayUnion
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCjoG7jIP1xs-uoBTMezml7UuTsyIouzoY",
        authDomain: "werkzeug-verleih-sv.firebaseapp.com",
        projectId: "werkzeug-verleih-sv"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore();

    let currentUser = null;
    let toolRef = null;

    // LOGIN prüfen
    onAuthStateChanged(auth, async user => {
        if (!user) { window.location = "login.html"; return; }

        currentUser = user;
        document.getElementById("userInfo").innerText = user.email;

        // QR‑Code Werkzeug-ID lesen
        const params = new URLSearchParams(window.location.search);
        const toolID = params.get("tool");

        if (!toolID) {
            document.getElementById("toolBox").innerHTML = "Kein Werkzeug gefunden.";
            return;
        }

        loadTool(toolID);
    });

    // Werkzeug laden
    async function loadTool(id) {
        toolRef = doc(db, "tools", id);
        const snap = await getDoc(toolRef);

        if (!snap.exists()) {
            toolBox.innerHTML = "Werkzeug existiert nicht!";
            return;
        }

        const data = snap.data();

        toolBox.innerHTML = `
            <div><span class="label">ID:</span> ${id}</div>
            <div><span class="label">Name:</span> ${data.name}</div>
            <div><span class="label">Status:</span> 
                ${data.available == "1" 
                    ? '<span class="status-green">✅ Verfügbar</span>' 
                    : '<span class="status-red">❌ Ausgeliehen</span>'
                }
            </div>
        `;

        loadHistory(data.history || []);
    }

    // History anzeigen
    function loadHistory(list) {
        historyBox.innerHTML = list.map(entry => `
            <div class="history-entry">
                ${entry.time} – <b>${entry.user}</b> – ${entry.action}
                ${entry.person ? " an: " + entry.person : ""}
            </div>
        `).join("");
    }

    // Ausleihen
    window.borrowTool = async function () {
        const person = personField.value.trim();
        if (person === "") return alert("Bitte Empfänger eingeben!");

        await updateDoc(toolRef, {
            available: "0",
            history: arrayUnion({
                user: currentUser.email,
                action: "Ausgeliehen",
                person: person,
                time: new Date().toLocaleString()
            })
        });

        alert("Werkzeug ausgeliehen!");
        location.reload();
    };

    // Zurückgeben
    window.returnTool = async function () {
        await updateDoc(toolRef, {
            available: "1",
            history: arrayUnion({
                user: currentUser.email,
                action: "Zurückgegeben",
                person: "",
                time: new Date().toLocaleString()
            })
        });

        alert("Werkzeug zurückgegeben!");
        location.reload();
    };

    // Logout
    window.logout = function () {
        signOut(auth).then(() => window.location = "login.html");
    };
</script>

</body>
</html>
