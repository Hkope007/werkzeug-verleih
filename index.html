<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Werkzeug Verleih</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js
https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js

<style>
body{font-family:Arial;padding:20px;background:#f4f4f4;}
.card{background:white;padding:20px;border-radius:8px;border:1px solid #ccc;max-width:450px;margin-bottom:20px;}
input,select,button{width:100%;padding:10px;margin-top:10px;font-size:16px;}
.history{white-space:pre-line;background:white;border:1px solid #ccc;padding:10px;max-height:200px;overflow-y:auto;}
</style>
</head>

<body>

<button onclick="logout()">🔓 Abmelden</button>

<div id="toolCard" class="card">Warte auf Werkzeug…</div>

<div class="card">
  <h3>📜 Historie</h3>
  <div id="history" class="history">Lade…</div>
</div>

<script>
const firebaseConfig={
  apiKey:"AIzaSyCjoG7jIP1xs-uoBTMezml7UuTsyIouzoY",
  authDomain:"werkzeug-verleih-sv.firebaseapp.com",
  projectId:"werkzeug-verleih-sv",
  storageBucket:"werkzeug-verleih-sv.appspot.com",
  messagingSenderId:"1083183347140",
  appId:"1:1083183347140:web:26b2a6c2203b7c6021e091"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

auth.onAuthStateChanged(user=>{
  if(!user) return window.location="login.html";
  loadTool();
});

const params=new URLSearchParams(window.location.search);
const toolId=params.get("tool");
const toolRef=db.collection("tools").doc(toolId);
const histRef=db.collection("history_"+toolId);

async function loadTool(){
  const snap=await toolRef.get();
  if(!snap.exists){
    toolCard.textContent="❌ Werkzeug nicht gefunden!";
    return;
  }
  const t=snap.data();
  toolCard.innerHTML=`
    <h2>${t.name}</h2>
    <p>Verfügbar: ${t.available} von ${t.total}</p>

    <label>Werkzeug ausgeben an:</label>
    <input id="assigned" placeholder="leer = selbst">

    <label>Menge:</label>
    <select id="qty">
      ${Array.from({length:Number(t.total)},(_,i)=>`<option>${i+1}</option>`).join("")}
    </select>

    <button onclick="borrow()">➡️ Ausleihen</button>
    <button onclick="giveBack()">⬅️ Rückgabe</button>
  `;
  loadHistory();
}

async function loadHistory(){
  const snap=await histRef.orderBy("time","desc").get();
  history.innerHTML = snap.empty
    ?"Keine Einträge"
    :snap.docs.map(d=>{
       const h=d.data();
       return `${new Date(h.time).toLocaleString()} – ${h.bookedBy} ➜ ${h.assignedTo}: ${h.text}`;
     }).join("\n");
}

async function borrow(){
  const qty=Number(document.getElementById("qty").value);
  const assigned=document.getElementById("assigned").value.trim()||"Selbst";

  await db.runTransaction(async tx=>{
    const snap=await tx.get(toolRef);
    const t=snap.data();

    if(Number(t.available)<qty) return alert("Nicht genug verfügbar!");

    tx.update(toolRef,{available:String(Number(t.available)-qty)});
    tx.set(histRef.doc(),{
      time:Date.now(),
      bookedBy:"User",
      assignedTo:assigned,
      text:`${qty} Stück ausgegeben`
    });
  });

  loadTool();
}

async function giveBack(){
  const qty=Number(document.getElementById("qty").value);

  await db.runTransaction(async tx=>{
    const snap=await tx.get(toolRef);
    const t=snap.data();

    if(Number(t.available)+qty > Number(t.total))
      return alert("Rückgabe zu hoch!");

    tx.update(toolRef,{available:String(Number(t.available)+qty)});
    tx.set(histRef.doc(),{
      time:Date.now(),
      bookedBy:"User",
      assignedTo:"User",
      text:`${qty} Stück zurückgegeben`
    });
  });

  loadTool();
}

function logout(){ auth.signOut().then(()=>window.location="login.html"); }
</script>

</body>
</html>
