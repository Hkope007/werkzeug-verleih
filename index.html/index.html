<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DEBUG URL</title>
</head>
<body>

<h1>DEBUG – URL Test</h1>

<p><b>Aktuelle URL:</b></p>
<pre id="fullUrl"></pre>

<p><b>Parameter „tool“:</b></p>
<pre id="toolValue"></pre>

<script>
  const url = window.location.href;
  const params = new URLSearchParams(window.location.search);
  const tool = params.get("tool");

  document.getElementById("fullUrl").innerText = url;
  document.getElementById("toolValue").innerText =
    tool ? tool : "❌ KEIN tool-Parameter gefunden";
</script>

</body>
</html>
