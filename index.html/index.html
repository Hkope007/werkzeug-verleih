<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
</title>  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; background: #f4f4f4; }
    .card {
      background: #fff;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      max-width: 480px;
      margin-bottom: 20px;
    }
    input, select, button {
      width: 100%; padding: 10px; margin-top: 8px; font-size: 16px;
    }
    .danger { background: #b00000; color: white; }
    .admin-btn { background: #444; color: white; }
    .history { white-space: pre-line; max-height: 260px; overflow-y: auto; padding: 10px; border: 1px solid #ddd; }
  </style>

</head>
<body>

<h1>🔧 Werkzeug Verleih</h1>

<button class="admin-btn" onclick="logout()">🔓 Abmelden</button>

<div id="toolCard" class="card">Warte auf Werkzeug…</div>

<div class="card">
  <h3>📜 Historie</h3>
  <div id="history" class="history">Noch keine Einträge</div>
</div>

<!-- ✅ ADMIN PANEL -->
<div id="adminPanel" style="display:none;">
  <div class="card">
    <h2>🔧 Admin Bereich</h2>

    <h3>👤 Mitarbeiter hinzufügen</h3>
    <input id="newEmpId" placeholder="Mitarbeiter-ID">
    <input id="newEmpName" placeholder="Name">
    <input id="newEmpEmail" placeholder="E-Mail">
    <input id="newEmpPw" placeholder="Passwort">
    <button onclick="addEmployee()">✅ Mitarbeiter speichern</button>

    <h3>🧑‍🤝‍🧑 Mitarbeiterliste</h3>
    <div id="empList"></div>

    <h3>🛠 Werkzeug hinzufügen</h3>
    <input id="newToolId" placeholder="Werkzeug-ID">
    <input id="newToolName" placeholder="Werkzeugname">
    <input id="newToolTotal" placeholder="Gesamtmenge">
    <button onclick="addTool()">✅ Werkzeug speichern</button>

    <h3>🔧 Werkzeugliste</h3>
    <div id="toolList"></div>

    <button class="danger" onclick="closeAdmin()">❌ Admin schließen</button>
  </div>
</div>

<script>
/* ✅ Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyCjoG7jIP1xs-uoBTMezml7UuTsyIouzoY",
  authDomain: "werkzeug-verleih-sv.firebaseapp.com",
  projectId: "werkzeug-verleih-sv",
  storageBucket: "werkzeug-verleih-sv.appspot.com",
  messagingSenderId: "1083183347140",
  appId: "1:1083183347140:web:26b2a6c2203b7c6021e091"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

/* ✅ Eingeloggter User */
let currentUser = null;
let currentUserData = null;

/* ✅ Login prüfen */
auth.onAuthStateChanged(async user => {
  if (!user) return window.location.href = "login.html";
  currentUser = user;

  const snap = await db.collection("users").where("email", "==", user.email).get();
  currentUserData = snap.docs[0].data();

  if (currentUserData.role === "admin") {
    document.getElementById("adminPanel").style.display = "block";
    loadAdmin();
  }

  loadTool();
});

/* ✅ Werkzeug-ID aus URL */
const params = new URLSearchParams(window.location.search);
const toolId = params.get("tool");
const toolRef = db.collection("tools").doc(toolId);
const histRef = db.collection("history_" + toolId);

/* ✅ Werkzeug laden */
async function loadTool() {
  const snap = await toolRef.get();
  if (!snap.exists) {
    toolCard.innerHTML = "❌ Werkzeug nicht gefunden";
    return;
  }

  const tool = snap.data();

  toolCard.innerHTML = `
    <h2>${tool.name}</h2>
    <p><b>ID:</b> ${toolId}</p>
    <p><b>Verfügbar:</b> ${tool.available} von ${tool.total}</p>

    <label>Werkzeug ausgeben an:</label>
    <input id="assignedTo" placeholder="Name eingeben (leer = selbst)">
    
    <label>Menge:</label>
    <select id="qty">
      ${Array.from({ length: Number(tool.total) }, (_,i)=>`<option>${i+1}</option>`).join("")}
    </select>

    <button onclick="borrow()">➡️ Ausleihen</button>
    <button onclick="giveBack()">⬅️ Rückgeben</button>
  `;

  loadHistory();
}

/* ✅ Historie laden */
async function loadHistory() {
  const snap = await histRef.orderBy("time", "desc").get();
  if (snap.empty) {
    history.innerHTML = "Noch keine Einträge";
    return;
  }

  history.innerHTML = snap.docs.map(d => {
    const h = d.data();
    return `${new Date(h.time).toLocaleString()} – ${h.bookedBy} ➜ ${h.assignedTo}: ${h.text}`;
  }).join("\n");
}

/* ✅ Ausleihen */
async function borrow() {
  const qty = Number(qty.value);
  const assigned = assignedTo.value.trim() || currentUserData.name;

  await db.runTransaction(async tx => {
    const snap = await tx.get(toolRef);
    const tool = snap.data();
    const available = Number(tool.available);

    if (available < qty) return alert("❌ Nicht genug verfügbar!");

    tx.update(toolRef, { available: String(available - qty) });
    tx.set(histRef.doc(), {
      time: Date.now(),
      bookedBy: currentUserData.name,
      assignedTo: assigned,
      text: `${qty} Stück ausgeliehen`
    });
  });

  loadTool();
}

/* ✅ Rückgabe */
async function giveBack() {
  const qty = Number(document.getElementById("qty").value);

  await db.runTransaction(async tx => {
    const snap = await tx.get(toolRef);
    const tool = snap.data();
    const available = Number(tool.available);
    const total = Number(tool.total);

    if (available + qty > total)
      return alert("❌ Rückgabe zu hoch!");

    tx.update(toolRef, { available: String(available + qty) });
    tx.set(histRef.doc(), {
      time: Date.now(),
      bookedBy: currentUserData.name,
      assignedTo: currentUserData.name,
      text: `${qty} Stück zurückgegeben`
    });
  });

  loadTool();
}

/* ✅ ADMIN → Mitarbeiter speichern */
async function addEmployee() {
  const id = newEmpId.value.trim();
  const name = newEmpName.value.trim();
  const email = newEmpEmail.value.trim();
  const pw = newEmpPw.value.trim();

  if (!id || !name || !email || !pw)
    return alert("Bitte alle Felder ausfüllen!");

  await auth.createUserWithEmailAndPassword(email, pw);
  await db.collection("users").doc(id).set({
    name, email, role: "mitarbeiter"
  });

  alert("✅ Mitarbeiter gespeichert!");
  loadAdmin();
}

/* ✅ ADMIN → Werkzeug hinzufügen */
async function addTool() {
  const id = newToolId.value.trim();
  const name = newToolName.value.trim();
  const total = newToolTotal.value.trim();

  await db.collection("tools").doc(id).set({
    name,
    total,
    available: total
  });

  alert("✅ Werkzeug gespeichert!");
  loadAdmin();
}

/* ✅ Admin-Daten laden */
async function loadAdmin() {
  const empSnap = await db.collection("users").get();
  empList.innerHTML = empSnap.docs.map(d => `${d.id} — ${d.data().name}`).join("<br>");

  const toolSnap = await db.collection("tools").get();
  toolList.innerHTML = toolSnap.docs.map(d =>
    `${d.id} — ${d.data().name} (${d.data().total})`
  ).join("<br>");
}

/* ✅ Logout */
function logout() {
  auth.signOut().then(() => window.location.href = "login.html");
}
</script>

</body>
</html>
