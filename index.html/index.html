<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR Kamera Test</title>

  <!-- ✅ STABILE QR-Bibliothek -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    #reader {
      width: 100%;
      max-width: 360px;
      margin-top: 20px;
    }
    #result {
      margin-top: 20px;
      font-size: 16px;
      padding: 10px;
      border: 1px solid #ccc;
    }
    button {
      padding: 12px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<h1>QR‑Scan Test</h1>

<button onclick="startScan()">Kamera starten</button>

<div id="reader"></div>

<div id="result">Warte auf QR‑Code …</div>

<script>
  let scanner;

  function startScan() {
    document.getElementById("result").innerText =
      "🔍 Scanner läuft – bitte QR‑Code ruhig halten";

    scanner = new Html5Qrcode("reader");

    scanner.start(
      { facingMode: "environment" },
      {
        fps: 5,
        qrbox: { width: 280, height: 280 }
      },
      (decodedText) => {
        document.getElementById("result").innerText =
          "✅ QR‑Code erkannt:\n" + decodedText;

        scanner.stop();
      },
      (_error) => {
        // Absichtlich leer – Scanner sucht kontinuierlich
      }
    );
  }
</script>

</body>
</html>
