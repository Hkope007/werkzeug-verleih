<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR Kamera Test</title>

  <!-- ✅ QR-Code Scanner Bibliothek -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    #reader {
      width: 100%;
      max-width: 320px;
      margin-top: 20px;
    }
    #result {
      margin-top: 20px;
      font-size: 18px;
      padding: 10px;
      border: 1px solid #ccc;
    }
    button {
      padding: 12px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h1>QR‑Scan – Kamera Test</h1>

  <button onclick="startScan()">Kamera starten</button>

  <div id="reader"></div>

  <div id="result">
    Noch kein QR‑Code gescannt
  </div>

  <script>
    let qrScanner;

    function startScan() {
      if (!qrScanner) {
        qrScanner = new Html5Qrcode("reader");
      }

      qrScanner.start(
        { facingMode: "environment" },
        {
          fps: 10,
          qrbox: { width: 250, height: 250 }
        },
        (decodedText) => {
          qrScanner.stop();
          document.getElementById("result").innerText =
            "✅ QR‑Code erkannt:\n" + decodedText;
        },
        (errorMessage) => {
          // Fehlermeldungen beim Scannen ignorieren
        }
      );
    }
  </script>

</body>
</html>
