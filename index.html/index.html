<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Werkzeug Verleih</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .box {
      border: 1px solid #ccc;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>Werkzeug Verleih</h1>

<div id="output" class="box">
  Bitte QR‑Code scannen …
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const toolId = params.get("tool");

  if (toolId) {
    document.getElementById("output").innerHTML = `
      <h2>Werkzeug erkannt</h2>
      <p><b>ID:</b> ${toolId}</p>
      <p>Status: verfügbar</p>
      <button>Ausleihen</button>
    `;
  }
</script>

</body>
</html>
