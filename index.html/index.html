<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Werkzeug Verleih</title>

  <!-- ✅ Firebase COMPAT SDK (richtige Version für deine App!) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }
    .card {
      background: #fff;
      padding: 16px;
      border-radius: 8px;
      max-width: 450px;
      border: 1px solid #ccc;
      margin-bottom: 18px;
    }
    h1,h2,h3 { margin-top: 0; }
    select, button {
      padding: 10px;
      font-size: 16px;
      width: 100%;
      margin-top: 10px;
    }
    .history {
      font-size: 14px;
      background: #fafafa;
      padding: 10px;
      border: 1px solid #ddd;
      max-height: 220px;
      overflow-y: auto;
      white-space: pre-line;
    }
  </style>
</head>
<body>

<h1>🔧 Werkzeug Verleih</h1>

<div id="toolCard" class="card">Warte auf Werkzeug …</div>

<div class="card">
  <h3>📜 Historie</h3>
  <div id="history" class="history">Noch keine Einträge</div>
</div>

<script>
  // ---------------------------------------------------------
  // ✅ DEINE FIREBASE CONFIG (aus deinem Screenshot eingefügt)
  // ---------------------------------------------------------
  const firebaseConfig = {
    apiKey: "AIzaSyCjoG7jIP1xs-uoBTMezml7UuTsyIouzoY",
    authDomain: "werkzeug-verleih-sv.firebaseapp.com",
    projectId: "werkzeug-verleih-sv",
    storageBucket: "werkzeug-verleih-sv.firebasestorage.app",
    messagingSenderId: "1083183347140",
    appId: "1:1083183347140:web:26b2a6c2203b7c6021e091",
    measurementId: "G-9B4KKYD7F3"
  };

  // ✅ Firebase initialisieren
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ---------------------------------------------------------
  // ✅ Werkzeug-ID aus URL holen (?tool=AKKU-001)
  // ---------------------------------------------------------
  const params = new URLSearchParams(window.location.search);
  const toolId = params.get("tool");

  const toolCard = document.getElementById("toolCard");
  const historyEl = document.getElementById("history");

  if (!toolId) {
    toolCard.innerHTML = "❌ Kein Werkzeug angegeben (QR-Code öffnen!)";
    throw new Error("Kein tool Parameter");
  }

  // ---------------------------------------------------------
  // ✅ Firestore Referenzen
  // ---------------------------------------------------------
  const toolRef = db.collection("tools").doc(toolId);
  const historyRef = db.collection("history_" + toolId);

  // ---------------------------------------------------------
  // ✅ Werkzeug laden
  // ---------------------------------------------------------
  async function loadTool() {
    const snap = await toolRef.get();

    if (!snap.exists) {
      toolCard.innerHTML = "❌ Werkzeug nicht gefunden";
      return;
    }

    const tool = snap.data();

    // Strings → Zahlen konvertieren
    const total = Number(tool.total);
    const available = Number(tool.available);

    toolCard.innerHTML = `
      <h2>${tool.name}</h2>
      <p><b>ID:</b> ${toolId}</p>
      <p><b>Verfügbar:</b> ${available} von ${total}</p>

      <label>Menge auswählen:</label>
      <select id="qty">
        ${Array.from({length: total}, (_, i) => `<option value="${i+1}">${i+1}</option>`).join("")}
      </select>

      <button onclick="borrow()">➡️ Ausleihen</button>
      <button onclick="giveBack()">⬅️ Zurückgeben</button>
    `;

    loadHistory();
  }

  // ---------------------------------------------------------
  // ✅ Historie laden
  // ---------------------------------------------------------
  async function loadHistory() {
    const snap = await historyRef.orderBy("time", "desc").get();

    if (snap.empty) {
      historyEl.textContent = "Noch keine Einträge";
      return;
    }

    historyEl.innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      return `${new Date(d.time).toLocaleString()} – ${d.text}`;
    }).join("\n");
  }

  // ---------------------------------------------------------
  // ✅ Ausleihen
  // ---------------------------------------------------------
  async function borrow() {
    const qty = Number(document.getElementById("qty").value);

    await db.runTransaction(async (tx) => {
      const snap = await tx.get(toolRef);
      const tool = snap.data();

      const available = Number(tool.available);
      if (available < qty) {
        alert("❌ Nicht genug verfügbar!");
        return;
      }

      tx.update(toolRef, { available: String(available - qty) });
      tx.set(historyRef.doc(), {
        time: Date.now(),
        text: `Ausgeliehen: ${qty}`
      });
    });

    loadTool();
  }

  // ---------------------------------------------------------
  // ✅ Rückgabe
  // ---------------------------------------------------------
  async function giveBack() {
    const qty = Number(document.getElementById("qty").value);

    await db.runTransaction(async (tx) => {
      const snap = await tx.get(toolRef);
      const tool = snap.data();

      const total = Number(tool.total);
      const available = Number(tool.available);

      if (available + qty > total) {
        alert("❌ Rückgabe zu hoch!");
        return;
      }

      tx.update(toolRef, { available: String(available + qty) });
      tx.set(historyRef.doc(), {
        time: Date.now(),
        text: `Zurückgegeben: ${qty}`
      });
    });

    loadTool();
  }

  // ---------------------------------------------------------
  // ✅ Start
  // ---------------------------------------------------------
  loadTool();

</script>

</body>
</html>
