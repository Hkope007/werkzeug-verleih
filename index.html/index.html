<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Werkzeug Verleih</title>

  <!-- ✅ Firebase COMPAT SDK (RICHTIG!) -->
  <script src="https://www.gstatic.com/firebasejsase-app-compat.js</script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }
    .card {
      background: #fff;
      padding: 16px;
      border-radius: 8px;
      max-width: 480px;
      border: 1px solid #ccc;
      margin-bottom: 22px;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      font-size: 16px;
    }
    .admin-btn {
      background: #444;
      color: #fff;
      cursor: pointer;
    }
    .danger {
      background: #b30000 !important;
      color: #fff;
      cursor: pointer;
    }
    .history {
      white-space: pre-line;
      font-size: 14px;
      background: #fafafa;
      border: 1px solid #ddd;
      padding: 10px;
      max-height: 220px;
      overflow-y: auto;
    }
  </style>
</head>

<body>

<h1>🔧 Werkzeug Verleih</h1>

<button class="admin-btn" onclick="openAdminLogin()">🔐 Admin Login</button>

<div id="toolCard" class="card">Warte auf Werkzeug …</div>

<div class="card">
  <h3>📜 Historie</h3>
  <div id="history">Noch keine Einträge</div>
</div>

<!-- ✅ ADMIN PANEL -->
<div id="adminPanel" style="display:none;">
  <div class="card">
    <h2>🔧 Admin Bereich</h2>

    <h3>👤 Mitarbeiter hinzufügen</h3>
    <input id="newEmpId" placeholder="Mitarbeiter-ID (z.B. TRASCH)">
    <input id="newEmpName" placeholder="Mitarbeiter-Name">
    <button onclick="addEmployee()">✅ Mitarbeiter speichern</button>

    <h3>🧑‍🤝‍🧑 Mitarbeiterliste</h3>
    <div id="empList"></div>

    <h3>🛠 Werkzeug hinzufügen</h3>
    <input id="newToolId" placeholder="Werkzeug-ID (AKKU-002)">
    <input id="newToolName" placeholder="Werkzeugname">
    <input id="newToolTotal" placeholder="Gesamtmenge">
    <button onclick="addTool()">✅ Werkzeug speichern</button>

    <h3>🔧 Werkzeugliste</h3>
    <div id="toolList"></div>

    <button class="danger" onclick="closeAdmin()">❌ Admin schließen</button>
  </div>
</div>

<script>
/* ✅ Deine Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyCjoG7jIP1xs-uoBTMezml7UuTsyIouzoY",
  authDomain: "werkzeug-verleih-sv.firebaseapp.com",
  projectId: "werkzeug-verleih-sv",
  storageBucket: "werkzeug-verleih-sv.appspot.com",
  messagingSenderId: "1083183347140",
  appId: "1:1083183347140:web:26b2a6c2203b7c6021e091",
  measurementId: "G-9B4KKYD7F3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
auth.signInAnonymously();

/* ✅ Werkzeug-ID aus URL */
const params = new URLSearchParams(window.location.search);
const toolId = params.get("tool");

const toolCard = document.getElementById("toolCard");
const historyEl = document.getElementById("history");

const toolRef = db.collection("tools").doc(toolId);
const histRef = db.collection("history_" + toolId);

/* ✅ Mitarbeiter laden */
async function getEmployees() {
  const snap = await db.collection("users").get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

/* ✅ Werkzeug laden */
async function loadTool() {
  const snap = await toolRef.get();
  if (!snap.exists) {
    toolCard.innerHTML = "❌ Werkzeug nicht gefunden";
    return;
  }

  const tool = snap.data();
  const total = Number(tool.total);
  const available = Number(tool.available);

  const employees = await getEmployees();

  toolCard.innerHTML = `
    <h2>${tool.name}</h2>
    <p><b>ID:</b> ${toolId}</p>
    <p><b>Verfügbar:</b> ${available} von ${total}</p>

    <label>Mitarbeiter auswählen:</label>
    <select id="empSelect">
      ${employees.map(e => `<option value="${e.id}">${e.name}</option>`).join("")}
    </select>

    <label>Menge:</label>
    <select id="qty">
      ${Array.from({ length: total }, (_, i) => `<option>${i+1}</option>`).join("")}
    </select>

    <button onclick="borrow()">➡️ Ausleihen</button>
    <button onclick="giveBack()">⬅️ Rückgeben</button>
  `;

  loadHistory();
}

/* ✅ Historie laden */
async function loadHistory() {
  const snap = await histRef.orderBy("time", "desc").get();

  if (snap.empty) {
    historyEl.innerHTML = "Noch keine Einträge";
    return;
  }

  historyEl.innerHTML = snap.docs
    .map(d => {
      const h = d.data();
      return `${new Date(h.time).toLocaleString()} – ${h.employee}: ${h.text}`;
    })
    .join("\n");
}

/* ✅ Ausleihen */
async function borrow() {
  const qty = Number(document.getElementById("qty").value);
  const empId = document.getElementById("empSelect").value;

  const empSnap = await db.collection("users").doc(empId).get();
  const empName = empSnap.data().name;

  await db.runTransaction(async tx => {
    const snap = await tx.get(toolRef);
    const tool = snap.data();

    const available = Number(tool.available);
    if (available < qty) return alert("❌ Nicht genug verfügbar!");

    tx.update(toolRef, { available: String(available - qty) });
    tx.set(histRef.doc(), {
      time: Date.now(),
      employee: empName,
      text: `Ausgeliehen: ${qty}`
    });
  });

  loadTool();
}

/* ✅ Rückgabe */
async function giveBack() {
  const qty = Number(document.getElementById("qty").value);
  const empId = document.getElementById("empSelect").value;

  const empSnap = await db.collection("users").doc(empId).get();
  const empName = empSnap.data().name;

  await db.runTransaction(async tx => {
    const snap = await tx.get(toolRef);
    const tool = snap.data();

    const total = Number(tool.total);
    const available = Number(tool.available);

    if (available + qty > total) return alert("❌ Rückgabe zu hoch!");

    tx.update(toolRef, { available: String(available + qty) });
    tx.set(histRef.doc(), {
      time: Date.now(),
      employee: empName,
      text: `Zurückgegeben: ${qty}`
    });
  });

  loadTool();
}

/* ✅ ADMIN LOGIN */
function openAdminLogin() {
  const pw = prompt("Admin-PIN:");
  if (pw === "1234") loadAdmin();
  else alert("❌ Falscher PIN!");
}

/* ✅ ADMIN PANEL LADEN */
async function loadAdmin() {
  document.getElementById("adminPanel").style.display = "block";

  const empSnap = await db.collection("users").get();
  document.getElementById("empList").innerHTML =
    empSnap.docs.map(d => `${d.id} — ${d.data().name}`).join("<br>");

  const toolSnap = await db.collection("tools").get();
  document.getElementById("toolList").innerHTML =
    toolSnap.docs.map(d => `${d.id} — ${d.data().name} (${d.data().total})`).join("<br>");
}

/* ✅ ADMIN SCHLIESSEN */
function closeAdmin() {
  document.getElementById("adminPanel").style.display = "none";
}

/* ✅ Mitarbeiter hinzufügen */
async function addEmployee() {
  const id = document.getElementById("newEmpId").value;
  const name = document.getElementById("newEmpName").value;

  if (!id || !name) return alert("Bitte alles ausfüllen!");

  await db.collection("users").doc(id).set({ name });
  alert("✅ Mitarbeiter gespeichert!");
  loadAdmin();
}

/* ✅ Werkzeug hinzufügen */
async function addTool() {
  const id = document.getElementById("newToolId").value;
  const name = document.getElementById("newToolName").value;
  const total = document.getElementById("newToolTotal").value;

  if (!id || !name || !total) return alert("Bitte alles ausfüllen!");

  await db.collection("tools").doc(id).set({
    name,
    total,
    available: total
  });

  alert("✅ Werkzeug gespeichert!");
  loadAdmin();
}

/* ✅ Starten */
loadTool();
</script>

</body>
</html>
