<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Werkzeug Verleih</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    button {
      padding: 14px;
      font-size: 18px;
      margin-top: 10px;
      width: 100%;
    }
    #result {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ccc;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1>Werkzeug Verleih</h1>

<input
  type="file"
  accept="image/*"
  capture="environment"
  id="camera"
  style="display:none"
/>

<button onclick="openCamera()">QR‑Code scannen</button>

<div id="result">Noch kein QR‑Code erkannt</div>

<script>
  function openCamera() {
    document.getElementById("camera").click();
  }

  document.getElementById("camera").addEventListener("change", function () {
    document.getElementById("result").innerText =
      "✅ QR‑Code aufgenommen\nID: AKKU‑001 (Test)";
  });
</script>

</body>
</html>
