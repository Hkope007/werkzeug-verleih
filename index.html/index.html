<h1>🔧 Werkzeug Verleih</h1>

<div id="toolCard" class="card">
  Werkzeug wird geladen …
</div>

<div id="historyCard" class="card">
  <h3>📜 Historie</h3>
  <div id="history" class="history">
    Noch keine Einträge
  </div>
</div>

<script>
  // ✅ Werkzeug-Stammdaten (später DB)
  const tools = {
    "AKKU-001": { name: "Akkuschrauber Bosch", total: 5 },
    "FLEX-001": { name: "Flex Makita", total: 2 }
  };

  // ✅ URL-Parameter lesen
  const params = new URLSearchParams(window.location.search);
  const toolId = params.get("tool");

  // ✅ lokaler Speicher
  const storeKey = "tool_" + toolId;
  let state = JSON.parse(localStorage.getItem(storeKey)) || {
    available: tools[toolId]?.total || 0,
    history: []
  };

  function save() {
    localStorage.setItem(storeKey, JSON.stringify(state));
    render();
  }

  function addHistory(text) {
    const time = new Date().toLocaleString();
    state.history.unshift(`${time} – ${text}`);
  }

  function borrow() {
    const qty = Number(document.getElementById("qty").value);
    if (qty > state.available) {
      alert("Nicht genügend Stück verfügbar!");
      return;
    }
    state.available -= qty;
    addHistory(`Ausgeliehen: ${qty} Stück`);
    save();
  }

  function giveBack() {
    const qty = Number(document.getElementById("qty").value);
    const maxBack = tools[toolId].total - state.available;
    if (qty > maxBack) {
      alert("Rückgabe zu hoch!");
      return;
    }
    state.available += qty;
    addHistory(`Zurückgegeben: ${qty} Stück`);
    save();
  }

  function render() {
    const tool = tools[toolId];
    const card = document.getElementById("toolCard");
