
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Willkommen</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #eef1f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .box {
    background: white;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
    width: 300px;
    box-shadow: 0 0 12px rgba(0,0,0,0.15);
  }
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
// ✅ Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCjoG7jIP1xs-uoBTMezml7UuTsyIouzoY",
  authDomain: "werkzeug-verleih-sv.firebaseapp.com",
  projectId: "werkzeug-verleih-sv",
  storageBucket: "werkzeug-verleih-sv.appspot.com",
  messagingSenderId: "1083183347140",
  appId: "1:1083183347140:web:26b2a6c2203b7c6021e091"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ✅ Persistenter Login
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

// ✅ Wenn NICHT eingeloggt → zurück zum Login
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
  }
});
</script>

</head>
<body>

<div class="box">
  <h2>✅ Du bist jetzt eingeloggt!</h2>
  <p>Scanne jetzt ein Werkzeug oder öffne einen QR‑Code.</p>
</div>

</body>
</html>
